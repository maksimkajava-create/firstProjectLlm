services:
  app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    env_file:
      - .env                 
    volumes:
      - ./:/app              
    depends_on:
      - database 
      - rabbitmq

  web-proxy:
    build:
      context: .
      dockerfile: ./web-proxy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq  
    restart: on-failure 
  database:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data 
volumes:
  rabbitmq_data:
  postgres_data:
